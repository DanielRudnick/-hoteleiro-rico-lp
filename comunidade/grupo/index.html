<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<title>Comunidade Hoteleiro Rico — Acesse o Grupo</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#C41A1A;--red-bright:#E02020;--red-dim:#8B1212;
    --black:#080808;--black-2:#0F0F0F;--black-3:#171717;--black-5:#2E2E2E;
    --white:#FFFFFF;--off-white:#F4F4F4;--gray:#AAAAAA;--gray-dim:#555555;--green:#2ECC71;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--black);color:var(--off-white);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.05'/%3E%3C/svg%3E");opacity:.55;pointer-events:none;z-index:0}
  .card{position:relative;z-index:1;max-width:480px;width:100%;background:var(--black-2);border:1px solid var(--black-5);border-top:3px solid var(--red);padding:52px 44px}
  .icon{font-size:2.8rem;margin-bottom:20px}
  .tag{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--red-bright);margin-bottom:16px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;font-weight:400;letter-spacing:.04em;color:var(--white);margin-bottom:12px;line-height:1.05}
  .sub{font-size:.95rem;color:var(--gray);line-height:1.65;margin-bottom:36px;font-weight:300}
  .btn{display:block;background:var(--red);color:var(--white);font-family:'Barlow',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:18px 32px;text-decoration:none;transition:background .18s,transform .12s;margin-bottom:16px}
  .btn:hover{background:var(--red-bright);transform:translateY(-2px)}
  .btn-ghost{display:block;font-size:.82rem;color:var(--gray-dim);text-decoration:none;padding:12px;transition:color .2s}
  .btn-ghost:hover{color:var(--off-white)}
  .divider{border:none;border-top:1px solid var(--black-5);margin:32px 0}
  .note{font-size:.78rem;color:var(--gray-dim);line-height:1.6}
</style>
<!-- Facebook Pixel -->

<body>
  <div class="card">
    <div class="icon">🎯</div>
    <div class="tag">Comunidade Hoteleiro Rico</div>
    <h1>Você está dentro!</h1>
    <p class="sub">Clique no botão abaixo para entrar no grupo e participar das aulas toda quarta-feira.</p>

    <!-- ⚠️ Substitua o href pelo link real do grupo (WhatsApp, Telegram, etc.) -->
    <a href="https://chat.whatsapp.com/CQCvIJlwcViDGwdGPe2cSy" class="btn" id="btn-grupo">
      Entrar no grupo agora →
    </a>

    <a href="https://ohoteleirorico.com.br" class="btn-ghost">← Voltar para o site</a>

    <hr class="divider">
    <p class="note">Próxima aula: <strong style="color:var(--green)">quarta-feira</strong><br>Fique de olho nas notificações do grupo.</p>
  </div>
</body>
</html>
